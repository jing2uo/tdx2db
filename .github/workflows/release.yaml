name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            os_title: Linux
            arch_title: x86_64
            ext: ""
            archive: tar.gz
            prepare: true
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            os_title: Linux
            arch_title: arm64
            ext: ""
            archive: tar.gz
            prepare: true
          - os: macos-14
            goos: darwin
            goarch: arm64
            os_title: Darwin
            arch_title: arm64
            ext: ""
            archive: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            os_title: Windows
            arch_title: x86_64
            ext: ".exe"
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Prepare datatool (linux only)
        if: matrix.prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y unrar
          make prepare

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=${DATE}" \
            -o tdx2db${{ matrix.ext }} ./main.go

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          NAME="tdx2db_${{ matrix.os_title }}_${{ matrix.arch_title }}"
          tar -czf "${NAME}.tar.gz" tdx2db${{ matrix.ext }}

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          NAME="tdx2db_${{ matrix.os_title }}_${{ matrix.arch_title }}"
          7z a "${NAME}.zip" tdx2db${{ matrix.ext }}

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tdx2db_*.*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: archives
          pattern: archive-*
          merge-multiple: true

      - name: Determine pre-release
        id: prerel
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            archives/tdx2db_*.* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            ${{ steps.prerel.outputs.flag }}
