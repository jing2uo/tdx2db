name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            prepare: true
          - os: macos-14
            goos: darwin
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Prepare datatool (linux only)
        if: matrix.prepare
        run: |
          sudo apt-get update
          sudo apt-get install -y unrar
          make prepare

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o tdx2db${{ matrix.ext }} ./main.go

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tdx2db${{ matrix.ext }}
          retention-days: 7
